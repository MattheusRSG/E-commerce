# Profile padrao usa H2 local para rodar direto no IntelliJ sem variaveis externas.
# Para usar Supabase, rode com SPRING_PROFILES_ACTIVE=supabase ou -Dspring.profiles.active=supabase.
spring.profiles.default=local

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Cache Configuration - Desabilitar cache de segundo nível
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Spring Cache Configuration
spring.cache.type=simple

# Server Configuration
server.port=${PORT:8080}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.ecommerce=INFO
