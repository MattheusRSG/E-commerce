# Database Configuration - PostgreSQL
# Pode ser sobrescrito por variáveis de ambiente: DB_URL, DB_USER, DB_PASSWORD
# Mantém os defaults originais do projeto para facilitar execução local.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/estilo_feminino}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:010203040506070809}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Cache Configuration - Desabilitar cache de segundo nível
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Spring Cache Configuration
spring.cache.type=simple

# Server Configuration
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.ecommerce=INFO

# DevTools
# Evita reinício automático duplicado ao iniciar no IntelliJ (abre navegador duas vezes).
spring.devtools.restart.enabled=false
